const recorder = {
    rec: null, chunks: [], stream: null, isRec: false,
    async toggle() {
        if (aiMode.active) { ui.toast('AI模式运行中，请先停止AI模式'); return; }
        const btn = document.getElementById('btn-record');
        if (!this.isRec) {
            engine.stopAll();
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({audio:true});
                this.rec = new MediaRecorder(this.stream); this.chunks = [];
                this.rec.ondataavailable = e => this.chunks.push(e.data);
                this.rec.onstop = () => { if(this.stream) this.stream.getTracks().forEach(t=>t.stop()); if(!this.forceStop) this.playCmp(); };
                this.rec.start(); this.isRec = true;
                if(btn) { btn.classList.add('recording'); btn.innerText="■ 停止录音"; }
            } catch(e) { alert("无麦克风权限"); }
        } else { this.stop(false); }
    },
    stop(force) {
        if (this.isRec) { this.forceStop=force; this.rec.stop(); this.isRec=false; }
        const btn = document.getElementById('btn-record');
        if(btn) { btn.classList.remove('recording'); btn.innerText="🎤 按下开始录音"; }
    },
    playCmp() {
        const s = state.segments[state.currIndex], a = document.getElementById('main-audio'), r = document.getElementById('record-audio');
        const b = new Blob(this.chunks,{type:'audio/mp3'}); r.src=URL.createObjectURL(b);
        ui.toast("▶️ 原音"); a.currentTime=s.start; a.play();
        const timer = setInterval(() => {
            if (a.currentTime >= s.end) {
                a.pause(); clearInterval(timer);
                setTimeout(() => {
                    ui.toast("🎙️ 录音"); r.currentTime=0; r.play();
                    r.onended = () => { const btn=document.getElementById('btn-record'); if(btn) btn.classList.remove('playing'); ui.toast("播放完毕"); };
                    const btn = document.getElementById('btn-record'); if(btn) btn.classList.add('playing');
                }, 500);
            }
        }, 30);
    }
};

// ============================================================
//  AI MODE —— V68 全新升级版
// ============================================================
const aiMode = {
    active: false,
    failCount: 0,
    maxFails: 3,
    threshold: 100,
    recognition: null,
    audioCtx: null,
    _cycleTimer: null,
    _listenTimeout: null,
    _playRafId: null,    // ← RAF精准时间轴监控
    _warmSR: null,       // ← 预热SR对象，减少启动延迟
    manualPracticeMode: false,
    failedSentences: [],
    reviewMode: false,
    reviewQueue: [],

    // ──────────────────────────────────────
    //  公开接口：开关切换
    // ──────────────────────────────────────
    toggle() {
        if (this.active) this.stop();
        else this.start();
    },

    updateThreshold(v) {
        this.threshold = parseInt(v);
        document.getElementById('ai-threshold-val').innerText = v + '%';
        const slider = document.getElementById('ai-threshold');
        const pct = ((v - slider.min) / (slider.max - slider.min)) * 100;
        slider.style.setProperty('--fill', pct + '%');
    },

    // ──────────────────────────────────────
    //  启动（含iOS AudioContext + 麦克风解锁）
    // ──────────────────────────────────────
    async start() {
        if (!state.segments.length) return ui.toast('请先加载内容');
        if (!document.getElementById('main-audio').src) return ui.toast('音频未就绪');
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return ui.toast('❌ 浏览器不支持语音识别 (需 iOS Safari 14.5+ 或 Chrome)');

        // iOS: 在用户手势内解锁 AudioContext
        try {
            if (!this.audioCtx) this.audioCtx = new(window.AudioContext||window.webkitAudioContext)();
            if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
            const silBuf = this.audioCtx.createBuffer(1,1,22050);
            const silSrc = this.audioCtx.createBufferSource(); silSrc.buffer = silBuf;
            silSrc.connect(this.audioCtx.destination); silSrc.start(0);
        } catch(e) { console.warn('AudioContext unlock warn:', e); }

        // iOS: 在用户手势内预授权麦克风
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            stream.getTracks().forEach(t=>t.stop());
        } catch(e) { ui.toast('❌ 麦克风权限被拒绝'); return; }

        // 停止其他引擎
        engine.mode = 'IDLE'; engine.isWaiting = false;
        if (engine.waitTimer) clearTimeout(engine.waitTimer);
        if (engine.reqId) cancelAnimationFrame(engine.reqId);
        clearTimeout(engine.editorTimer);
        document.getElementById('main-audio').pause();
        document.getElementById('main-audio').loop = false;
        recorder.stop(true); ui.resetButtons();

        // ── 激活AI模式
        this.active = true;
        if (!this.reviewMode) {
            // 普通模式：重置失败记录
            this.failedSentences = [];
        }
        this.failCount = 0;
        this.manualPracticeMode = false;
        this._setBtn('running');
        document.getElementById('ai-mode-bar').classList.add('ai-running');
        document.getElementById('ai-mode-bar').classList.remove('ai-manual');
        document.getElementById('btn-ai-resume').style.display = 'none';
        document.getElementById('text-container').classList.remove('ai-manual');
        this.setStatus('🚀 启动中', '');

        // ── AI模式强制永隐字幕（Requirement 1）
        state.permBlurMode = 'hide';
        state.userBlurState = true;
        ui.updatePermButtons();
        ui.updatePractice(state.currIndex);

        setTimeout(() => this.runCycle(), 400);
    },

    // ──────────────────────────────────────
    //  停止
    // ──────────────────────────────────────
    stop() {
        const wasManual = this.manualPracticeMode;
        this.active = false;
        this.manualPracticeMode = false;
        this.reviewMode = false;
        if (this._cycleTimer) { clearTimeout(this._cycleTimer); this._cycleTimer = null; }
        if (this._listenTimeout) { clearTimeout(this._listenTimeout); this._listenTimeout = null; }
        if (this._playRafId) { cancelAnimationFrame(this._playRafId); this._playRafId = null; }
        if (this.recognition) { try { this.recognition.abort(); } catch(e) {} this.recognition = null; }
        if (this._warmSR) { try { this._warmSR.abort(); } catch(e) {} this._warmSR = null; }
        const a = document.getElementById('main-audio'); try { a.pause(); } catch(e) {}
        if (wasManual) engine.stopAll();
        this._setBtn('idle');
        document.getElementById('ai-mode-bar').classList.remove('ai-running', 'ai-manual');
        document.getElementById('btn-ai-resume').style.display = 'none';
        document.getElementById('text-container').classList.remove('ai-manual');
        this.setStatus('待机', '');
    },

    // ──────────────────────────────────────
    //  主循环
    // ──────────────────────────────────────
    runCycle() {
        if (!this.active) return;

        if (this.reviewMode && this.reviewQueue.length === 0) {
            this.active = false;
            this._setBtn('idle');
            document.getElementById('ai-mode-bar').classList.remove('ai-running','ai-manual');
            this.setStatus('复习完成', 'success');
            this.playBeep('complete');
            setTimeout(() => this.showRoundComplete(true), 800);
            return;
        }

        const idx = this.reviewMode ? this.reviewQueue[0] : state.currIndex;
        state.currIndex = idx;
        state.userBlurState = true;
        ui.updatePractice(idx);
        this.setStatus('▶ 播放中', '');

        const seg = state.segments[idx];
        if (!seg) { this.stop(); return; }

        const a = document.getElementById('main-audio');

        // ── 预热SR对象：在用户点击后的手势上下文内提前创建，降低mic启动延迟
        this._preWarmSR();

        a.currentTime = seg.start;
        const playP = a.play();
        if (playP) playP.catch(e => { console.error('AI play failed:', e); this.stop(); });

        // ── RAF精准时间轴：严格在seg.end处停止，不依赖setTimeout漂移
        this._startPlayWatcher(seg.end);
    },

    // ── RAF监控播放终点，精准在seg.end停止，立即触发识别
    _startPlayWatcher(endTime) {
        if (this._playRafId) { cancelAnimationFrame(this._playRafId); this._playRafId = null; }
        const a = document.getElementById('main-audio');
        const watch = () => {
            if (!this.active) { this._playRafId = null; return; }
            // 已经暂停（例如到达文件末尾）或超过终点
            if (!a.paused && a.currentTime < endTime) {
                this._playRafId = requestAnimationFrame(watch);
                return;
            }
            // 精准停止
            try { a.pause(); } catch(e) {}
            this._playRafId = null;
            // 立即启动识别，SR已预热，mic延迟最小化
            this.startListening();
        };
        this._playRafId = requestAnimationFrame(watch);
    },

    // ── 预热SR：提前构建对象，减少.start()后的mic启动延迟
    _preWarmSR() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        try {
            if (this._warmSR) { try { this._warmSR.abort(); } catch(e) {} }
            this._warmSR = new SR();
            this._warmSR.lang = 'en-US';
            this._warmSR.continuous = false;
            this._warmSR.interimResults = false;
            this._warmSR.maxAlternatives = 3;
        } catch(e) { this._warmSR = null; }
    },

    // ──────────────────────────────────────
    //  语音识别
    // ──────────────────────────────────────
    startListening() {
        if (!this.active) return;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        this.setStatus('👂 正在听...', 'listening');

        // ── 使用预热SR或新建，最小化mic启动延迟
        const r = this._warmSR || new SR();
        this._warmSR = null;
        r.lang = 'en-US';
        r.continuous = false;
        r.interimResults = false;
        r.maxAlternatives = 3;
        this.recognition = r;

        // ── 动态超时：按句子词数计算，每词1.2s，最少12s，最多25s
        const key = state.activeSub===1?'text2':(state.activeSub===2?'text3':'text');
        const refText = state.segments[state.currIndex][key] || '';
        const wordCount = refText.trim().split(/\s+/).filter(Boolean).length;
        const dynamicTimeout = Math.min(25000, Math.max(12000, wordCount * 1200));

        let settled = false;
        const settle = fn => { if (settled) return; settled = true; clearTimeout(this._listenTimeout); fn(); };

        r.onresult = e => settle(() => {
            const ref = this._normalize(refText);
            let best = { sim: -1, t: '' };
            for (let i = 0; i < e.results[0].length; i++) {
                const t = this._normalize(e.results[0][i].transcript);
                const s = this._similarity(ref, t);
                if (s > best.sim) best = { sim: s, t };
            }
            this.evaluate(best.sim * 100, best.t);
        });

        r.onerror = e => settle(() => {
            console.warn('SR error:', e.error);
            if (e.error === 'no-speech') {
                this.setStatus('🔇 未听到', 'fail');
            } else if (e.error === 'aborted') {
                // 主动中止，不触发失败
                return;
            } else {
                this.setStatus(`⚠️ ${e.error}`, 'fail');
            }
            this._scheduleOnFail();
        });

        r.onend = () => settle(() => {
            // onend 在 onresult 之后也会触发；settle 保证只处理一次
            this.setStatus('🔇 无输入', 'fail');
            this._scheduleOnFail();
        });

        this._listenTimeout = setTimeout(() => settle(() => {
            try { r.abort(); } catch(e) {}
            this.setStatus(`⏱ 超时(${(dynamicTimeout/1000).toFixed(0)}s)`, 'fail');
            this._scheduleOnFail();
        }), dynamicTimeout);

        try { r.start(); } catch(e) {
            settle(() => { this.setStatus('❌ 启动失败', 'fail'); this._scheduleOnFail(); });
        }
    },

    // ──────────────────────────────────────
    //  评估识别结果
    // ──────────────────────────────────────
    evaluate(simPct, transcript) {
        const pass = simPct >= this.threshold;
        const icon = pass ? '✅' : '❌';
        this.setStatus(`${icon} ${simPct.toFixed(0)}%`, pass ? 'success' : 'fail');
        console.log(`[AI] 识别: "${transcript}" | 相似度: ${simPct.toFixed(1)}% | 阈值: ${this.threshold}% | ${pass?'通过':'失败'}`);

        if (pass) {
            this.failCount = 0;
            if (this.reviewMode) this.reviewQueue.shift(); // 从复习队列移除
            this.playBeep('success');
            this._cycleTimer = setTimeout(() => {
                if (!this.active) return;
                if (this.reviewMode) { this.runCycle(); return; }
                if (state.currIndex < state.segments.length - 1) {
                    state.currIndex++;
                    this.runCycle();
                } else {
                    // ── 最后一句通过，本轮结束
                    this.active = false;
                    this._setBtn('idle');
                    document.getElementById('ai-mode-bar').classList.remove('ai-running','ai-manual');
                    this.setStatus('🎊 完成！', 'success');
                    this.playBeep('complete');
                    setTimeout(() => this.showRoundComplete(), 1000);
                }
            }, 800);

        } else {
            // ── 识别失败
            if (this.failCount === 0 && !this.reviewMode) {
                // 第一次失败（仅非复习模式）：进入手动复习模式
                this.failCount = 1;
                this.playBeep('fail');
                this._enterManualPractice();
            } else {
                this._scheduleOnFail();
            }
        }
    },

    // ──────────────────────────────────────
    //  进入手动复习模式（第一次失败后）
    // ──────────────────────────────────────
    _enterManualPractice() {
        this.manualPracticeMode = true;
        document.getElementById('ai-mode-bar').classList.remove('ai-running');
        document.getElementById('ai-mode-bar').classList.add('ai-manual');
        document.getElementById('btn-ai-resume').style.display = 'block';
        document.getElementById('text-container').classList.add('ai-manual');
        this.setStatus('👆 手动复习', 'manual');
        // ← 不强制显示/隐藏字幕，由用户自己通过"👁 显示"按钮决定
        ui.toast('💡 可点"循环单句"/"播单句"练习，完成后点"继续AI →"');
    },

    // ──────────────────────────────────────
    //  从手动复习模式恢复（用户点"继续AI"）
    // ──────────────────────────────────────
    resumeFromManual() {
        if (!this.active || !this.manualPracticeMode) return;
        this.manualPracticeMode = false;
        engine.stopAll(); // 停止手动复习的引擎
        // 恢复永隐状态
        state.userBlurState = true;
        ui.updatePractice(state.currIndex);
        // 恢复AI模式UI
        document.getElementById('ai-mode-bar').classList.add('ai-running');
        document.getElementById('ai-mode-bar').classList.remove('ai-manual');
        document.getElementById('btn-ai-resume').style.display = 'none';
        document.getElementById('text-container').classList.remove('ai-manual');
        this.setStatus('▶ 继续中...', '');
        this._cycleTimer = setTimeout(() => this.runCycle(), 600);
    },

    // ──────────────────────────────────────
    //  失败调度（第2次及以后）
    // ──────────────────────────────────────
    _scheduleOnFail() {
        this.failCount++;
        this.playBeep('fail');

        // 普通模式：连错maxFails次才自动跳过
        // 复习模式：不自动跳过，一直重试（直到通过或用户停止）
        if (!this.reviewMode && this.failCount >= this.maxFails) {
            if (!this.failedSentences.includes(state.currIndex)) {
                this.failedSentences.push(state.currIndex);
            }
            this.failCount = 0;
            this.setStatus('⏭ 跳过', 'fail');
            this.playBeep('skip');
            this._cycleTimer = setTimeout(() => {
                if (!this.active) return;
                if (state.currIndex < state.segments.length - 1) {
                    state.currIndex++;
                    this.runCycle();
                } else {
                    // 最后一句跳过，整轮结束
                    this.active = false;
                    this._setBtn('idle');
                    document.getElementById('ai-mode-bar').classList.remove('ai-running','ai-manual');
                    this.setStatus('完成', 'success');
                    setTimeout(() => this.showRoundComplete(), 800);
                }
            }, 1500);
        } else {
            // 复习模式或未达上限：直接重试
            this._cycleTimer = setTimeout(() => {
                if (!this.active) return;
                this.runCycle();
            }, 900);
        }
    },

    // ──────────────────────────────────────
    //  展示本轮完成弹窗（含鼓励语）
    // ──────────────────────────────────────
    showRoundComplete(isReview = false) {
        const total = state.segments.length;
        const failedCount = this.failedSentences.length;
        const passedCount = total - failedCount;
        const accuracy = total > 0 ? Math.round(passedCount / total * 100) : 100;

        let emoji, title, msg;
        if (isReview) {
            const stillFailed = this.failedSentences.length;
            if (stillFailed === 0) {
                emoji = '🏅'; title = '复习大获全胜！';
                msg = '太了不起了！所有错误的句子全部通关，你的坚持没有白费！';
            } else {
                emoji = '💪'; title = '复习完成！';
                msg = `还有 ${stillFailed} 句需要继续磨练，但每次练习都是进步！`;
            }
        } else {
            if (accuracy >= 97) {
                emoji = '🏆'; title = '完美表现！近乎满分！';
                msg = '你的发音令人叹服，几乎每一句都无懈可击！继续保持这份完美！';
            } else if (accuracy >= 85) {
                emoji = '🌟'; title = '非常出色！';
                msg = '你的英语口语真的很棒！这样的水平已经超越了大多数人，为你骄傲！';
            } else if (accuracy >= 70) {
                emoji = '💪'; title = '很有进步！';
                msg = '基础扎实，继续坚持跟读练习，你会越来越强！语感正在悄悄提升！';
            } else if (accuracy >= 50) {
                emoji = '📈'; title = '不错的开始！';
                msg = '每一次开口都是勇气，继续跟读，进步会越来越快！不要放弃！';
            } else {
                emoji = '🌱'; title = '勇于开口就是进步！';
                msg = '英语学习从来都不是一朝一夕，每一次练习都在积累！继续加油！';
            }
        }

        document.getElementById('round-emoji').innerText = emoji;
        document.getElementById('round-title').innerText = title;
        document.getElementById('round-stats').innerText = `共 ${total} 句 · 通过 ${passedCount} 句 · 正确率 ${accuracy}%`;
        document.getElementById('round-msg').innerText = msg;

        // 动画填充进度条（延迟触发CSS动画）
        const fill = document.getElementById('round-accuracy-fill');
        fill.style.width = '0%';
        setTimeout(() => { fill.style.width = accuracy + '%'; }, 100);

        // 是否显示复习按钮
        const reviewBtn = document.getElementById('round-review-btn');
        if (!isReview && this.failedSentences.length > 0) {
            reviewBtn.style.display = 'block';
            reviewBtn.innerText = `💪 再次练习错误句子 (${this.failedSentences.length} 句)`;
        } else {
            reviewBtn.style.display = 'none';
        }

        document.getElementById('ai-round-modal').style.display = 'flex';
    },

    closeRoundModal() {
        document.getElementById('ai-round-modal').style.display = 'none';
    },

    // ──────────────────────────────────────
    //  开始复习失败的句子
    // ──────────────────────────────────────
    startReview() {
        if (!this.failedSentences.length) return;
        this.closeRoundModal();
        this.reviewMode = true;
        this.reviewQueue = [...this.failedSentences];
        this.failedSentences = []; // 重置，用于记录本次复习中仍然失败的句子（可选）
        this.failCount = 0;
        // 跳转到第一个复习句子
        state.currIndex = this.reviewQueue[0];
        ui.updatePractice(state.currIndex);
        ui.toast(`💪 开始复习 ${this.reviewQueue.length} 个错误句子`);
        // 重启AI模式
        setTimeout(() => this.start(), 300);
    },

    // ──────────────────────────────────────
    //  工具：文本标准化
    // ──────────────────────────────────────
    _normalize(s) {
        return s.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
    },

    _similarity(a, b) {
        if (!a && !b) return 1;
        if (!a || !b) return 0;
        const dist = this._levenshtein(a, b);
        return 1 - dist / Math.max(a.length, b.length);
    },

    _levenshtein(a, b) {
        const m = a.length, n = b.length;
        let prev = Array.from({length: n+1}, (_,j) => j);
        for (let i = 1; i <= m; i++) {
            const curr = [i];
            for (let j = 1; j <= n; j++) {
                curr[j] = a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j],curr[j-1],prev[j-1]);
            }
            prev = curr;
        }
        return prev[n];
    },

    // ──────────────────────────────────────
    //  音效合成（纯AudioContext，无外部依赖）
    // ──────────────────────────────────────
    playBeep(type) {
        try {
            if (!this.audioCtx) this.audioCtx = new(window.AudioContext||window.webkitAudioContext)();
            const ctx = this.audioCtx;
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;

            if (type === 'success') {
                // 鲜亮欢快的上行琶音: E5→G5→B5→E6 + 高频闪光
                const arpNotes = [
                    { freq: 659.25, t: 0,    dur: 0.22 },
                    { freq: 783.99, t: 0.075, dur: 0.22 },
                    { freq: 987.77, t: 0.15,  dur: 0.22 },
                    { freq: 1318.5, t: 0.225, dur: 0.38 },
                ];
                arpNotes.forEach(n => {
                    const osc = ctx.createOscillator(), g = ctx.createGain();
                    osc.connect(g); g.connect(ctx.destination);
                    osc.type = 'sine'; osc.frequency.value = n.freq;
                    const t = now + n.t;
                    g.gain.setValueAtTime(0, t);
                    g.gain.linearRampToValueAtTime(0.4, t + 0.018);
                    g.gain.exponentialRampToValueAtTime(0.001, t + n.dur);
                    osc.start(t); osc.stop(t + n.dur);
                });
                // 高频闪光感
                const shimmer = ctx.createOscillator(), sg = ctx.createGain();
                shimmer.connect(sg); sg.connect(ctx.destination);
                shimmer.type = 'triangle'; shimmer.frequency.value = 2637;
                sg.gain.setValueAtTime(0.15, now); sg.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                shimmer.start(now); shimmer.stop(now + 0.1);
                // 加一个正弦底音增加丰满感
                const base = ctx.createOscillator(), bg = ctx.createGain();
                base.connect(bg); bg.connect(ctx.destination);
                base.type = 'sine'; base.frequency.value = 329.63; // E4
                bg.gain.setValueAtTime(0.15, now); bg.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                base.start(now); base.stop(now + 0.4);

            } else if (type === 'fail') {
                // 低沉嘟声
                const osc = ctx.createOscillator(), g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(240, now); osc.frequency.exponentialRampToValueAtTime(160, now + 0.4);
                g.gain.setValueAtTime(0.18, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                osc.start(now); osc.stop(now + 0.45);

            } else if (type === 'skip') {
                // 三连短音
                for (let i = 0; i < 3; i++) {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = 'triangle'; o.frequency.value = 440;
                    const t = now + i * 0.16;
                    g.gain.setValueAtTime(0.22, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    o.start(t); o.stop(t + 0.1);
                }

            } else if (type === 'complete') {
                // 胜利和弦: C5-E5-G5-C6
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = 'sine'; o.frequency.value = freq;
                    const t = now + i * 0.09;
                    g.gain.setValueAtTime(0.28, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
                    o.start(t); o.stop(t + 0.7);
                });
            }
        } catch(e) { console.warn('beep error:', e); }
    },

    // UI 辅助
    setStatus(text, type) {
        const pill = document.getElementById('ai-status-pill'); if (!pill) return;
        pill.innerText = text;
        pill.className = 'ai-status-pill' + (type ? ' ' + type : '');
    },
    _setBtn(mode) {
        const btn = document.getElementById('btn-ai-mode'); if (!btn) return;
        if (mode === 'running') { btn.className = 'btn-ai-toggle running'; btn.innerText = '⏹ 停止AI'; }
        else { btn.className = 'btn-ai-toggle idle'; btn.innerText = '🤖 AI模式'; }
    }
};

// ============================================================
//  事件绑定
// ============================================================
document.getElementById('project-file').addEventListener('change', e => app.loadProject(e.target));
document.getElementById('audio-file').addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) { document.getElementById('main-audio').src = URL.createObjectURL(f); ui.updateAudioStatus(); }
});
document.getElementById('ai-threshold').addEventListener('input', function() {
    const pct = ((this.value - this.min) / (this.max - this.min)) * 100;
    this.style.setProperty('--fill', pct + '%');
});

// ============================================================
//  工具函数
// ============================================================
function fmtTime(s, srt = false) {
    const d = new Date(0); d.setMilliseconds(s * 1000);
    const str = d.toISOString().substr(11, 12);
    return srt ? str.replace('.', ',') : str.substr(0, 8);
}

// 核心SRT解析（与V50.3行为100%一致）
function parseSRT(t) {
    const r = [];
    const e = /(\d+)?\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})\s-->\s(\d{2}:\d{2}:\d{2}[,.]\d{3})\s+([\s\S]*?)(?=\n\d+\s+\d{2}:\d{2}|$)/g;
    let m;
    while (m = e.exec(t)) r.push({ start: pt(m[2]), end: pt(m[3]), text: m[4].trim() });
    return r;
}

function pt(s) {
    s = s.replace(',', '.'); const p = s.split(':');
    return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseFloat(p[2]);
}

function detectSilence(b, th) {
    const d = b.getChannelData(0), sr = b.sampleRate, min = 0.4 * sr;
    let res = [], sp = false, st = 0, sil = 0;
    for (let i = 0; i < d.length; i += 200) {
        if (Math.abs(d[i]) > th) {
            if (!sp) { sp = true; st = i; } sil = 0;
        } else if (sp) {
            if (!sil) sil = i;
            if (i - sil > min) {
                const s = st/sr, e = sil/sr;
                if (e-s > 0.3) res.push({start:s, end:e, text:""});
                sp = false; sil = 0;
            }
        }
    }
    if (sp) res.push({start:st/sr, end:d.length/sr, text:""});
    return res;
}
